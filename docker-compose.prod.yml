version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-complaintiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-complaintiq}
      POSTGRES_DB: ${POSTGRES_DB:-complaintiq}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://complaintiq:complaintiq@db:5432/complaintiq}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:-postgresql://complaintiq:complaintiq@db:5432/complaintiq}
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    volumes:
      # Lightweight custom configuration to proxy /api requests to FastAPI
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
