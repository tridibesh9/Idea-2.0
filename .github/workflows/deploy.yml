name: Deploy to Google Cloud VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package.json'

      - name: Install Frontend Dependencies & Build
        run: |
          cd frontend
          npm install
          npm run build

      - name: Set up SSH Private Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_IP }} >> ~/.ssh/known_hosts

      - name: Sync Files to VM via Rsync
        run: |
          # Create app directory if not exists
          ssh -i ~/.ssh/id_rsa ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} "mkdir -p ~/app"
          
          # Sync directories (excluding heavy local/built directories and git details)
          rsync -avz -e "ssh -i ~/.ssh/id_rsa" \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'venv' \
            --exclude '__pycache__' \
            --exclude 'backend/__pycache__' \
            --exclude 'mock_emails' \
            ./ ${{ secrets.VM_USER }}@${{ secrets.VM_IP }}:~/app/

      - name: Rebuild & Restart Docker Services on VM
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} "
            cd ~/app
            # Recreate containers with new builds in the background
            docker-compose down
            docker-compose up -d --build
          "
